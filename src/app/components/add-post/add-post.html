<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <h2 class="mb-3">Write a new post</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="title">Title</label>
          <input
            id="title"
            type="text"
            class="form-control"
            formControlName="title"
            [class.is-invalid]="
              form.get('title')?.invalid && form.get('title')?.touched
            "
          />
          <div class="invalid-feedback" *ngIf="form.get('title')?.errors?.['required']">
            Title is required.
          </div>
          <div class="invalid-feedback" *ngIf="form.get('title')?.errors?.['minlength']">
            Title must be at least 5 characters.
          </div>
          <div class="invalid-feedback" *ngIf="form.get('title')?.errors?.['maxlength']">
            Title must be at most 150 characters.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="categoryId">Category</label>
          <select
            id="categoryId"
            class="form-select"
            formControlName="categoryId"
            [class.is-invalid]="
              form.get('categoryId')?.invalid &&
              form.get('categoryId')?.touched
            "
          >
            <option value="">Select a category</option>
            <ng-container *ngIf="categories$ | async as categories">
              <option *ngFor="let category of categories" [value]="category.id">
                {{ category.name }}
              </option>
            </ng-container>
          </select>
          <div class="invalid-feedback" *ngIf="form.get('categoryId')?.errors?.['required']">
            Category is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="content">Content</label>
          <textarea
            id="content"
            rows="6"
            class="form-control"
            formControlName="content"
            [class.is-invalid]="
              form.get('content')?.invalid && form.get('content')?.touched
            "
          ></textarea>
          <div class="invalid-feedback" *ngIf="form.get('content')?.errors?.['required']">
            Content is required.
          </div>
          <div class="invalid-feedback" *ngIf="form.get('content')?.errors?.['maxlength']">
            Content must be at most 2500 characters.
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button
            type="button"
            class="btn btn-outline-secondary"
            [routerLink]="['/']"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">
            Submit
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
